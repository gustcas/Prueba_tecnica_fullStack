<ion-header>
  <ion-toolbar>
    <ion-title>Tareas</ion-title>
    <ion-button slot="end" fill="clear" size="small" (click)="logout()">
      Cerrar sesión
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item *ngFor="let task of tasks" (click)="openDetail(task)">
      <ion-label>
        <h2>{{ task.title }}</h2>
        <p>{{ task.description }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
